name: Walk-Forward Backtest

# 手动触发，选择策略和参数
on:
  workflow_dispatch:
    inputs:
      strategy:
        description: '策略 (v4 / mr / ed / all)'
        required: true
        default: 'all'
        type: choice
        options: [v4, mr, ed, all]
      top_n_max:
        description: 'V4 top_n 最大值 (默认7，填2可测试 top_n=[2-7])'
        required: false
        default: '7'
      cache_key:
        description: 'AV Cache key suffix (默认 latest)'
        required: false
        default: 'latest'

jobs:
  walk-forward:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 最长6小时

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt --quiet

      - name: Download AV data cache from Release
        run: |
          echo "📥 从 GitHub Release 下载 AV 数据缓存..."
          gh release download av-cache-latest --pattern "av-cache.tar.gz" --repo ${{ github.repository }}
          echo "📦 解压缓存..."
          tar -xzf av-cache.tar.gz
          rm av-cache.tar.gz
          echo "✅ AV cache ready: $(du -sh .cache/av)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Walk-Forward
        run: |
          echo "🚀 启动 Walk-Forward: strategy=${{ github.event.inputs.strategy }}"
          python scripts/walk_forward_v5_full.py --strategy ${{ github.event.inputs.strategy }}
        env:
          PYTHONIOENCODING: utf-8
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: walk-forward-${{ github.event.inputs.strategy }}-${{ github.run_id }}
          path: |
            scripts/stress_test_results/walk_forward_v5_full_*.json
            scripts/stress_test_results/walk_forward_v5_full_*.log
          retention-days: 90


      - name: Print summary
        if: always()
        run: |
          echo "## Walk-Forward 结果" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          tail -30 scripts/stress_test_results/walk_forward_v5_full_*.log 2>/dev/null || echo "no log found"
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
