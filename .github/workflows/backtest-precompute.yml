name: Backtest Precompute (Weekly Cache Warmup)

# 每周六 22:00 UTC = 周日 11:00 NZT（rotation 跑完后约 1 小时）
# 也可手动触发
on:
  schedule:
    - cron: '0 22 * * 6'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run（只跑1个combo验证）'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  precompute:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      - name: Download AV data cache
        run: |
          echo "📥 下载 AV OHLCV 磁盘缓存..."
          gh release download av-cache-latest --pattern "av-cache.tar.gz" --repo ${{ github.repository }} || echo "⚠️ 无 Release 缓存，将从 AV API 重新拉取"
          if [ -f av-cache.tar.gz ]; then
            tar -xzf av-cache.tar.gz
            rm av-cache.tar.gz
            echo "✅ AV cache ready: $(du -sh .cache/av 2>/dev/null || echo 'empty')"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run precompute
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          echo "🚀 开始回测预计算..."
          python scripts/backtest_precompute.py $DRY_RUN_FLAG
        env:
          PYTHONIOENCODING: utf-8
          APP_ENV: production
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Summary
        if: always()
        run: |
          echo "## 回测预计算结果" >> $GITHUB_STEP_SUMMARY
          echo "- 触发时间：$(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- 缓存写入：Supabase cache_store (bt_v2:2018-01-01:* 共50条)" >> $GITHUB_STEP_SUMMARY
