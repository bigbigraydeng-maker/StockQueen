name: Backtest Precompute (Weekly Cache Warmup)

# 每周六 22:00 UTC = 周日 11:00 NZT（rotation 跑完后约 1 小时）
# 也可手动触发
on:
  schedule:
    - cron: '0 22 * * 6'
  workflow_dispatch:
    inputs:
      regime:
        description: 'Regime version（all=两个并行, v1=只跑v1, v2=只跑v2）'
        required: false
        default: 'all'
        type: choice
        options: ['all', 'v1', 'v2']
      dry_run:
        description: 'Dry-run（只跑1个combo验证）'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  precompute:
    name: precompute-${{ matrix.regime }}
    runs-on: ubuntu-latest
    timeout-minutes: 360

    strategy:
      fail-fast: false   # 一个失败不影响另一个
      matrix:
        regime:
          - v1
          - v2
        exclude:
          # 手动触发且指定单个 regime 时，排除另一个
          - regime: ${{ github.event.inputs.regime == 'v1' && 'v2' || 'NONE' }}
          - regime: ${{ github.event.inputs.regime == 'v2' && 'v1' || 'NONE' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      - name: Download AV data cache
        run: |
          echo "📥 下载 AV OHLCV 磁盘缓存..."
          gh release download av-cache-latest --pattern "av-cache.tar.gz" --repo ${{ github.repository }} || echo "⚠️ 无 Release 缓存，将从 AV API 重新拉取"
          if [ -f av-cache.tar.gz ]; then
            tar -xzf av-cache.tar.gz
            rm av-cache.tar.gz
            echo "✅ AV cache ready: $(du -sh .cache/av 2>/dev/null || echo 'empty')"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run precompute (${{ matrix.regime }})
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          REGIME="${{ matrix.regime }}"
          echo "🚀 开始回测预计算 regime=$REGIME ..."
          python scripts/backtest_precompute.py --regime $REGIME $DRY_RUN_FLAG
        env:
          PYTHONIOENCODING: utf-8
          APP_ENV: production
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Summary
        if: always()
        run: |
          echo "## 回测预计算结果 (${{ matrix.regime }})" >> $GITHUB_STEP_SUMMARY
          echo "- 触发时间：$(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- Regime: ${{ matrix.regime }}（25 combos）" >> $GITHUB_STEP_SUMMARY
          echo "- 缓存目标：Supabase cache_store bt_v2:2018-01-01:*" >> $GITHUB_STEP_SUMMARY
