name: Live OOS Tracker (2026 W6-Preview)

# 每周一 21:00 UTC = 新西兰周二 10:00 NZT（盘后更新）
# 也可手动触发
on:
  schedule:
    - cron: '0 21 * * 1'
  workflow_dispatch:
    inputs:
      end_date:
        description: '追踪截止日期（默认：今日，格式 YYYY-MM-DD）'
        required: false
        default: ''

jobs:
  live-oos:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      - name: Download AV data cache (2025 warm-up data)
        run: |
          echo "📥 下载 AV 数据缓存（用于 2025 热身期价格数据）..."
          gh release download av-cache-latest --pattern "av-cache.tar.gz" --repo ${{ github.repository }} || echo "⚠️ 缓存下载失败，将实时拉取"
          if [ -f av-cache.tar.gz ]; then
            tar -xzf av-cache.tar.gz
            rm av-cache.tar.gz
            echo "✅ Cache ready: $(du -sh .cache/av 2>/dev/null || echo 'empty')"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Live OOS Tracker
        run: |
          END_DATE="${{ github.event.inputs.end_date }}"
          if [ -z "$END_DATE" ]; then
            END_DATE=$(date +%Y-%m-%d)
          fi
          echo "🚀 追踪 2026-01-02 → $END_DATE"
          python scripts/live_oos_2026.py --end "$END_DATE"
        env:
          PYTHONIOENCODING: utf-8
          MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: live-oos-2026-${{ github.run_id }}
          path: scripts/stress_test_results/live_oos_2026_*.json
          retention-days: 90

      - name: Print summary
        if: always()
        run: |
          echo "## 2026 Live OOS 追踪结果" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat scripts/stress_test_results/live_oos_2026_*.json 2>/dev/null | python -c "
          import json, sys
          try:
              data = json.load(sys.stdin)
              print(f\"YTD Return:    {data.get('ytd_return', 0):+.2%}\")
              print(f\"Sharpe (ref):  {data.get('sharpe', 0):.3f}\")
              print(f\"Max Drawdown:  {data.get('max_drawdown', 0):.2%}\")
              print(f\"SPY YTD:       {data.get('spy_return', 'N/A')}\")
              print(f\"Trading Days:  {data.get('trading_days', 0)}\")
          except:
              print('No result JSON found')
          " || echo "结果解析失败"
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
