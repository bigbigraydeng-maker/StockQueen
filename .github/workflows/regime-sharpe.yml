name: Regime Sharpe Analysis

# 手动触发 或 Walk-Forward 完成后自动触发
on:
  # 每月1号 22:00 UTC = NZT 每月2号 11:00（盘后分析）
  schedule:
    - cron: '0 22 1 * *'

  workflow_dispatch:
    inputs:
      wf_file:
        description: 'WF 结果文件名（留空=自动取最新本地文件）'
        required: false
        default: ''

  # Walk-Forward 成功完成后自动触发
  workflow_run:
    workflows: ["Walk-Forward Backtest"]
    types: [completed]

jobs:
  regime-sharpe:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install supabase --quiet

      # 统一下载最新 Walk-Forward artifact（无论何种触发方式）
      - name: Download latest Walk-Forward artifact
        run: |
          echo "🔍 查找最新成功的 Walk-Forward run..."

          # workflow_run 触发时优先用触发源 run id
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            SOURCE_RUN="${{ github.event.workflow_run.id }}"
          else
            SOURCE_RUN=$(gh run list \
              --workflow walk-forward.yml \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId' 2>/dev/null || echo "")
          fi

          if [ -z "$SOURCE_RUN" ]; then
            echo "⚠️ 未找到 Walk-Forward run，将使用 repo 内现有文件"
            exit 0
          fi

          echo "📥 Walk-Forward Run ID: $SOURCE_RUN"
          ARTIFACT_ID=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$SOURCE_RUN/artifacts" \
            --jq '.artifacts[] | select(.name | startswith("walk-forward")) | .id' \
            | head -1)

          if [ -z "$ARTIFACT_ID" ]; then
            echo "⚠️ 该 run 暂无 artifact，可能未完成上传"
            exit 0
          fi

          echo "📦 Artifact ID: $ARTIFACT_ID"
          mkdir -p scripts/stress_test_results
          gh api "repos/$GITHUB_REPOSITORY/actions/artifacts/$ARTIFACT_ID/zip" > /tmp/wf_artifact.zip
          unzip -o /tmp/wf_artifact.zip -d scripts/stress_test_results/
          echo "✅ 文件: $(ls scripts/stress_test_results/walk_forward_v5_full_*.json 2>/dev/null | wc -l) 个"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Run Regime Sharpe Analysis
        run: |
          echo "🔍 Regime 分段 Sharpe 分析开始..."
          if [ -n "${{ github.event.inputs.wf_file }}" ]; then
            python scripts/regime_sharpe_analysis.py --file "scripts/stress_test_results/${{ github.event.inputs.wf_file }}"
          else
            python scripts/regime_sharpe_analysis.py
          fi
        env:
          PYTHONIOENCODING: utf-8
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GITHUB_RUN_ID: ${{ github.run_id }}

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regime-sharpe-${{ github.run_id }}
          path: scripts/stress_test_results/regime_sharpe_*.json
          retention-days: 90
