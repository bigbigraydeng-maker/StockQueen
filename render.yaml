services:
  - type: web
    name: stockqueen-api
    runtime: python
    pythonVersion: "3.11.0"
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: FEISHU_APP_ID
        sync: false
      - key: FEISHU_APP_SECRET
        sync: false
      - key: FEISHU_RECEIVE_ID
        sync: false
      - key: FEISHU_WEBHOOK_URL
        sync: false
      - key: TIGER_ID
        sync: false
      - key: TIGER_ACCOUNT
        sync: false
      - key: TIGER_PRIVATE_KEY
        sync: false
      - key: ALPHA_VANTAGE_KEY
        sync: false

  - type: worker
    name: stockqueen-scheduler
    runtime: python
    pythonVersion: "3.11.0"
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: python -m app.scheduler
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: FEISHU_APP_ID
        sync: false
      - key: FEISHU_APP_SECRET
        sync: false
      - key: FEISHU_RECEIVE_ID
        sync: false
      - key: FEISHU_WEBHOOK_URL
        sync: false
      - key: TIGER_ID
        sync: false
      - key: TIGER_ACCOUNT
        sync: false
      - key: TIGER_PRIVATE_KEY
        sync: false
      - key: ALPHA_VANTAGE_KEY
        sync: false
