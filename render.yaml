# Render Blueprint for StockQueen
# This file defines all services for the StockQueen project

services:
  # 1. API Service (FastAPI + Dashboard)
  - type: web
    name: stockqueen-api
    runtime: python
    buildCommand: pip install --no-cache-dir -r requirements.txt && git fetch --unshallow 2>/dev/null || git fetch --depth=500 2>/dev/null || true; python scripts/generate_changelog.py
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT --timeout-keep-alive 300
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: FEISHU_APP_ID
        sync: false
      - key: FEISHU_APP_SECRET
        sync: false
      - key: FEISHU_RECEIVE_ID
        sync: false
      - key: FEISHU_WEBHOOK_URL
        sync: false
      - key: TIGER_ID
        sync: false
      - key: TIGER_ACCOUNT
        sync: false
      - key: TIGER_PRIVATE_KEY
        sync: false
      - key: ALPHA_VANTAGE_KEY
        sync: false

  # 2. Scheduler Worker
  - type: worker
    name: stockqueen-scheduler
    runtime: python
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: python -m app.scheduler
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: FEISHU_APP_ID
        sync: false
      - key: FEISHU_APP_SECRET
        sync: false
      - key: FEISHU_RECEIVE_ID
        sync: false
      - key: FEISHU_WEBHOOK_URL
        sync: false
      - key: TIGER_ID
        sync: false
      - key: TIGER_ACCOUNT
        sync: false
      - key: TIGER_PRIVATE_KEY
        sync: false
      - key: ALPHA_VANTAGE_KEY
        sync: false

  # 3. Marketing Website (Static Site)
  - type: web
    name: stockqueen-site
    runtime: static
    buildCommand: echo "Static site - no build needed"
    staticPublishPath: ./site
