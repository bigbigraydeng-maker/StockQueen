version: '3.8'

services:
  stockqueen-api:
    build: .
    container_name: stockqueen-api
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - LOG_LEVEL=INFO
      - TIMEZONE=Pacific/Auckland
      # Add other environment variables here or use .env file
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - stockqueen-network

networks:
  stockqueen-network:
    driver: bridge
