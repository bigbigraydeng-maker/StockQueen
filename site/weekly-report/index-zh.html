    <script>
        // Newsletter subscription
        document.getElementById('newsletter-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const language = document.querySelector('input[name="language"]:checked').value;
            const messageEl = document.getElementById('subscribe-message');
            
            try {
                // Store in localStorage for now (will be replaced with Supabase integration)
                const subscribers = JSON.parse(localStorage.getItem('newsletter_subscribers') || '[]');
                subscribers.push({
                    email: email,
                    language: language,
                    created_at: new Date().toISOString()
                });
                localStorage.setItem('newsletter_subscribers', JSON.stringify(subscribers));
                
                messageEl.textContent = '感谢订阅！';
                messageEl.style.color = '#34d399';
                messageEl.style.background = 'rgba(52, 211, 153, 0.1)';
                messageEl.style.display = 'block';
                this.reset();
                
                setTimeout(() => {
                    messageEl.style.display = 'none';
                }, 5000);
            } catch (error) {
                messageEl.textContent = '订阅失败，请重试。';
                messageEl.style.color = '#f87171';
                messageEl.style.background = 'rgba(248, 113, 113, 0.1)';
                messageEl.style.display = 'block';
            }
        });

        // Load reports from content directory
        async function loadReports() {
            try {
                // For now, we'll use a static list of reports
                // In production, this would fetch from an API or scan the content directory
                const reports = [
                    {
                        week: 11,
                        year: 2026,
                        date: '2026-03-14',
                        title: '市场轮动加速：AI板块承压',
                        summary: '量化分析显示资金明显从高Beta AI股票流出，转向防御性板块。我们的市场状态检测模型发出谨慎信号。',
                        slug: 'week-11-2026-zh'
                    },
                    {
                        week: 10,
                        year: 2026,
                        date: '2026-03-07',
                        title: '美联储政策展望与量化策略调整',
                        summary: '分析近期美联储沟通对动量模型的影响。针对潜在利率波动调整投资组合配置。',
                        slug: 'week-10-2026-zh'
                    },
                    {
                        week: 9,
                        year: 2026,
                        date: '2026-02-28',
                        title: '财报季总结：量化洞察',
                        summary: '系统性分析2025年第四季度财报惊喜及其对因子模型的影响。',
                        slug: 'week-09-2026-zh'
                    }
                ];

                // Display latest report
                if (reports.length > 0) {
                    const latest = reports[0];
                    document.getElementById('latest-report').innerHTML = `
                        <div onclick="window.location.href='./${latest.slug}.html'">
                            <div style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem;">
                                <span class="week-badge">第${latest.week}周 — ${latest.year}</span>
                                <span style="color: #6b7280; font-size: 0.875rem;">${latest.date}</span>
                            </div>
                            <h3 style="font-size: 1.25rem; font-weight: 600; margin-bottom: 0.75rem; color: white;">
                                ${latest.title}
                            </h3>
                            <p style="color: #9ca3af; line-height: 1.6;">
                                ${latest.summary}
                            </p>
                            <div style="margin-top: 1rem; display: flex; align-items: center; color: #22d3ee; font-size: 0.875rem; font-weight: 500;">
                                阅读报告 →
                            </div>
                        </div>
                    `;
                }

                // Display previous reports
                const previousReports = reports.slice(1);
                const previousContainer = document.getElementById('previous-reports');
                previousContainer.innerHTML = previousReports.map(report => `
                    <div class="report-card" onclick="window.location.href='./${report.slug}.html'" style="cursor: pointer;">
                        <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.75rem;">
                            <span class="week-badge">第${report.week}周</span>
                            <span style="color: #6b7280; font-size: 0.75rem;">${report.date}</span>
                        </div>
                        <h3 style="font-size: 1rem; font-weight: 600; margin-bottom: 0.5rem; color: white;">
                            ${report.title}
                        </h3>
                        <p style="color: #9ca3af; font-size: 0.875rem; line-height: 1.5;">
                            ${report.summary}
                        </p>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Failed to load reports:', error);
            }
        }

        loadReports();
