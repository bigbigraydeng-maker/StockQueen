<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 40" width="210" height="40" role="img" aria-label="StockQueen">
  <title>StockQueen</title>
  <defs>
    <linearGradient id="sq-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <!-- Crown icon: 3-prong crown fitting in ~28x24 area -->
  <!-- Points: bottom-left, up-left-edge, left-prong, valley-1, center-prong, valley-2, right-prong, up-right-edge, bottom-right -->
  <path d="M2,32 L2,22 L8,13 L13,24 L16,6 L19,24 L24,13 L30,22 L30,32 Z" fill="url(#sq-grad)"/>
  <!-- Crown base highlight line -->
  <rect x="2" y="30" width="28" height="2.5" rx="1" fill="url(#sq-grad)" opacity="0.6"/>
  <!-- StockQueen text -->
  <text x="38" y="29" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="700" fill="url(#sq-grad)" letter-spacing="-0.3">StockQueen</text>
</svg>
