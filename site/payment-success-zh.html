    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #fff; }

        }
        .glow-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);

<body class="min-h-screen flex items-center justify-center p-4">
    <div class="glow-card rounded-2xl p-10 max-w-lg w-full text-center">
        <div class="text-6xl mb-6">🎉</div>

        <h1 class="text-3xl font-bold mb-2">
            <span class="gradient-text">欢迎成为高级会员！</span>
        </h1>

        <p class="text-gray-400 text-sm mb-8">您的 StockQueen 高级订阅已激活</p>

        <div class="bg-white/5 rounded-xl p-6 mb-8 text-left">
            <h3 class="text-cyan-400 font-semibold text-sm uppercase tracking-wider mb-4">您的高级权益</h3>
            <ul class="space-y-3 text-gray-300 text-sm">
                <li class="flex items-center gap-3">
                    <span class="text-emerald-400">✅</span> 完整买卖信号及进仓价格
                </li>
                <li class="flex items-center gap-3">
                    <span class="text-emerald-400">✅</span> 止损位和止盈位
                </li>
                <li class="flex items-center gap-3">
                    <span class="text-emerald-400">✅</span> 完整持仓明细和交易记录
                </li>
                <li class="flex items-center gap-3">
                    <span class="text-emerald-400">✅</span> 每周六发送高级版周报
                </li>
                <li class="flex items-center gap-3">
                    <span class="text-emerald-400">✅</span> 含 7 天免费试用
                </li>
            </ul>
        </div>

        <div class="space-y-3">
            <a href="/weekly-report/index-zh.html"
               class="block w-full bg-gradient-to-r from-indigo-600 to-cyan-600 text-white py-3 px-6 rounded-lg font-semibold hover:opacity-90 transition">
                查看最新报告 →
            </a>
            <a href="/index-zh.html"
               class="block w-full bg-white/10 text-gray-300 py-3 px-6 rounded-lg font-medium hover:bg-white/20 transition">
                返回首页
            </a>
        </div>

        <p class="text-gray-600 text-xs mt-8">
            确认邮件已发送至您的邮箱。您的第一封高级版周报将在本周六送达。
        </p>
    </div>

    <!-- Conversion Tracking -->
    <script>
    (function() {
        var params = new URLSearchParams(location.search);
        var plan = params.get('plan') || 'monthly';
        var valueMap = { monthly: 49, quarterly: 129, yearly: 399 };
        var value = valueMap[plan] || 49;

        if (typeof gtag === 'function') {
            gtag('event', 'purchase', {
                transaction_id: params.get('session_id') || ('sq-' + Date.now()),
                value: value, currency: 'USD',
                items: [{ item_id: 'sq_premium_' + plan, item_name: 'StockQueen Premium ' + plan, price: value, quantity: 1 }]
            });
            // gtag('event', 'conversion', { send_to: 'AW-XXXXXXXXX/YYYYYYY', value: value, currency: 'USD' });
        }
        if (typeof fbq === 'function') {
            fbq('track', 'Purchase', { value: value, currency: 'USD', content_name: 'StockQueen Premium', content_ids: ['sq_premium_' + plan] });
        }
    })();
    </script>
</body>
