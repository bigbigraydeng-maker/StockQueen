<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}StockQueen{% endblock %}</title>
    <!-- TailwindCSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'sq-bg': '#0f172a',
                        'sq-card': '#1e293b',
                        'sq-border': '#334155',
                        'sq-green': '#22c55e',
                        'sq-red': '#ef4444',
                        'sq-gold': '#eab308',
                        'sq-accent': '#8b5cf6',
                        'sq-blue': '#3b82f6',
                    }
                }
            }
        }
    </script>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    {% block head_extra %}{% endblock %}
    <link rel="stylesheet" href="/static/css/custom.css">
</head>
<body class="bg-sq-bg text-gray-200 min-h-screen">
    <!-- Top Navigation -->
    <nav class="bg-sq-card border-b border-sq-border px-4 py-3 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-6">
                <a href="/dashboard" class="text-xl font-bold text-sq-accent flex items-center gap-2">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
                    </svg>
                    瑞德投资 · StockQueen
                </a>
                <div class="flex gap-4 text-sm">
                    <a href="/dashboard" class="px-3 py-1.5 rounded-md transition-colors
                        {% block nav_dashboard %}text-gray-400 hover:text-white hover:bg-sq-border{% endblock %}">
                        仪表盘
                    </a>
                    <a href="/knowledge" class="px-3 py-1.5 rounded-md transition-colors
                        {% block nav_knowledge %}text-gray-400 hover:text-white hover:bg-sq-border{% endblock %}">
                        知识投喂
                    </a>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div id="risk-badge"
                     hx-get="/htmx/risk-badge"
                     hx-trigger="load, every 60s"
                     hx-swap="innerHTML">
                </div>
                <a href="/docs" target="_blank" class="text-xs text-gray-500 hover:text-gray-300">API Docs</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="text-center text-xs text-gray-600 py-4 border-t border-sq-border mt-8">
        瑞德投资 · StockQueen V2.2 | AI-Driven Trading System | NZ Time
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
