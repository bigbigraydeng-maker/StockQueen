{% extends "base.html" %}
{% block title %}板块热力图 - StockQueen{% endblock %}
{% block nav_sector_center %}text-white bg-sq-border{% endblock %}

{% block content %}
<div class="space-y-6">

    <!-- Header -->
    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-bold text-white">板块热力图</h1>
            <p class="text-gray-400 text-sm mt-1">点击板块查看详情、持仓个股与趋势走势</p>
        </div>
        <div class="text-xs text-gray-500">评分颜色：<span class="text-green-400">绿=强势</span> · <span class="text-gray-400">灰=中性</span> · <span class="text-red-400">红=弱势</span></div>
    </div>

    <!-- Heatmap card (HTMX lazy load) -->
    <div class="bg-sq-card rounded-xl border border-sq-border p-5">
        <div id="sector-heatmap-content"
             hx-get="/htmx/sector-heatmap"
             hx-trigger="load"
             hx-swap="innerHTML">
            <!-- Skeleton -->
            <div class="flex items-center justify-center py-16 text-gray-500">
                <svg class="animate-spin w-6 h-6 mr-3 text-sq-accent" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
                </svg>
                加载板块数据中...
            </div>
        </div>
    </div>

    <!-- Note -->
    <p class="text-xs text-gray-600 text-center">数据来源：破浪轮动扫描 · 每日盘后更新 · 点击板块进入详情页</p>

</div>
{% endblock %}
