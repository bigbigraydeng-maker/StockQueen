<div class="grid grid-cols-3 sm:grid-cols-4 lg:grid-cols-5 gap-3">
    {% for sec in sectors %}
    <a href="/rotation/sector/{{ sec.name }}"
       class="block rounded-xl p-4 text-center hover:ring-2 hover:ring-yellow-400 transition-all cursor-pointer
           {% if sec.avg_score >= 5 %}bg-green-700/80 text-green-100
           {% elif sec.avg_score >= 2 %}bg-green-900/60 text-green-300
           {% elif sec.avg_score >= 0 %}bg-gray-700 text-gray-300
           {% elif sec.avg_score >= -3 %}bg-red-900/40 text-red-300
           {% else %}bg-red-900/80 text-red-200{% endif %}">
        <div class="text-xs font-semibold uppercase tracking-wide">{{ sec.name }}</div>
        <div class="text-2xl font-bold font-mono mt-1">{{ sec.avg_score }}</div>
        <div class="text-[11px] opacity-70 mt-1">{{ sec.count }}只</div>
        <div class="text-[11px] font-mono {% if sec.avg_ret_1w >= 0 %}text-green-300{% else %}text-red-300{% endif %}">
            {{ '%+.1f' | format(sec.avg_ret_1w) }}%/周
        </div>
    </a>
    {% endfor %}
    {% if not sectors %}
    <div class="col-span-3 sm:col-span-4 lg:col-span-5 text-center text-gray-500 py-10">
        <p class="text-base">暂无板块数据</p>
        <p class="text-xs mt-2">等待轮动扫描完成后自动生成</p>
    </div>
    {% endif %}
</div>
