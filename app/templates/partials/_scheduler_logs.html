{% if logs and logs|length > 0 %}
<table class="w-full text-sm">
    <thead>
        <tr class="border-b border-sq-border text-gray-500">
            <th class="text-left px-4 py-2 font-medium">任务名称</th>
            <th class="text-left px-4 py-2 font-medium">触发规则</th>
            <th class="text-right px-4 py-2 font-medium">下次执行</th>
        </tr>
    </thead>
    <tbody>
        {% for job in logs %}
        <tr class="border-b border-sq-border/50 hover:bg-sq-border/20">
            <td class="px-4 py-2 text-white whitespace-nowrap">{{ job.name }}</td>
            <td class="px-4 py-2 text-gray-400 font-mono text-xs">{{ job.trigger }}</td>
            <td class="px-4 py-2 text-right whitespace-nowrap">
                {% if job.next_run == 'paused' %}
                    <span class="text-yellow-400">已暂停</span>
                {% else %}
                    <span class="text-sq-accent">{{ job.next_run }}</span>
                {% endif %}
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
<div class="px-4 py-2 text-xs text-gray-500 text-right">
    共 {{ logs|length }} 个定时任务
</div>
{% else %}
<div class="text-center text-gray-500 py-6 text-sm">暂无调度任务</div>
{% endif %}
